<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global History Clicker - Visual Feedback</title>
    <style>
        body { 
            transition: 0.5s; font-family: 'serif'; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; background-color: #8B0000;
        }

        #game-container { 
            text-align: center; border: 8px double; padding: 20px; 
            width: 500px; position: relative; background: rgba(0,0,0,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* シンボルの演出：クリック時に跳ねる */
        #symbol-area { position: relative; height: 160px; display: flex; justify-content: center; align-items: center; }
        #symbol { 
            font-size: 110px; cursor: pointer; user-select: none; 
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        #symbol:active { transform: scale(1.3) rotate(10deg); } /* クリックで巨大化＆回転 */

        /* クリック地点に数字を出すアニメーション */
        .click-float {
            position: absolute; pointer-events: none; font-weight: bold;
            font-size: 24px; animation: floatUp 0.6s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        #event-display { background: #000; color: #fff; padding: 10px; margin: 15px 0; border-radius: 4px; }
        .stats-board { background: rgba(0,0,0,0.15); padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; text-align: left; border-radius: 8px; }
        .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .upgrade-card { border: 2px solid; padding: 12px; border-radius: 6px; }

        /* ボタンのフィードバック */
        button { 
            cursor: pointer; font-weight: bold; padding: 10px; margin-top: 10px;
            transition: transform 0.1s; border-radius: 4px;
        }
        button:active:not(:disabled) { transform: scale(0.9); }
        button:disabled { opacity: 0.4; transform: scale(1) !important; }

        /* モード別カラー */
        .mode-ussr { color: #FFD700; border-color: #FFD700; }
        .mode-ussr button { background: #FFD700; color: #8B0000; border: none; }
        .mode-usa { color: #ffffff; border-color: #BF0A30; }
        .mode-usa button { background: #BF0A30; color: #ffffff; border: 1px solid #fff; }
        .mode-japan { color: #9e0b0f; border-color: #9e0b0f; }
        .mode-japan button { background: #9e0b0f; color: #ffffff; border: none; }
    </style>
</head>
<body class="mode-ussr">

    <div id="game-container" class="mode-ussr">
        <div class="mode-switcher">
            <button onclick="switchMode('USSR')">ソ連</button>
            <button onclick="switchMode('USA')">アメリカ</button>
            <button onclick="switchMode('JAPAN')">大日本帝国</button>
        </div>
        
        <h1 id="title">☭ プロレタリア・クリッカー</h1>
        <div id="event-display">平和な時代</div>

        <div id="symbol-area">
            <div id="symbol" onmousedown="spawnFloatText(event)">☭</div>
        </div>

        <div class="stats-board">
            <div>共通資金: <span id="points">0</span></div>
            <div>1クリック: <span id="power">1</span></div>
            <div>自動生産: <span id="auto-val">0</span></div>
            <div>生産間隔: <span id="interval-display">1000</span>ms</div>
        </div>

        <div id="upgrade-container" class="upgrade-grid"></div>
    </div>

    <script>
        let state = {
            mode: 'USSR', points: 0, clickPower: 1, autoPower: 0,
            interval: 1000, debuffResist: 1.0, eventMult: 1.0,
            peacePreservationActive: false
        };

        const upgradeData = {
            USSR: [
                { name: "コルホーズ", desc: "Click+1", cost: 10, action: () => { state.clickPower += 1; } },
                { name: "ソフホーズ", desc: "Auto+1", cost: 50, action: () => { state.autoPower += 1; } },
                { name: "革命的製造", desc: "間隔-50ms", cost: 100, action: () => { state.interval = Math.max(100, state.interval - 50); resetAutoLoop(); } },
                { name: "思想教育", desc: "デバフ耐性UP", cost: 200, action: () => { state.debuffResist -= 0.001; } }
            ],
            USA: [
                { name: "ニューディール", desc: "C-1/A+10", cost: 30, action: () => { state.clickPower = Math.max(1, state.clickPower - 1); state.autoPower += 10; } },
                { name: "資本主義体制", desc: "C+2/間隔減", cost: 80, action: () => { state.clickPower += 2; state.interval = Math.max(100, state.interval - 30); resetAutoLoop(); } },
                { name: "西側の主", desc: "全体大幅UP", cost: 500, action: () => { state.clickPower += 10; state.autoPower += 50; } },
                { name: "政府投資", desc: "C+1(安価)", cost: 5, action: () => { state.clickPower += 1; } }
            ],
            JAPAN: [
                { name: "教育勅語", desc: "A+3/間隔減", cost: 50, action: () => { state.autoPower += 3; state.interval = Math.max(100, state.interval - 20); resetAutoLoop(); } },
                { name: "大和魂", desc: "全ステータスUP", cost: 1000, action: () => { state.clickPower += 20; state.autoPower += 100; state.interval = Math.max(100, state.interval - 100); resetAutoLoop(); } },
                { name: "天皇制", desc: "全ステ微増", cost: 150, action: () => { state.clickPower += 2; state.autoPower += 5; state.interval = Math.max(100, state.interval - 10); resetAutoLoop(); } },
                { name: "治安維持法", desc: "1分間5倍", cost: 0, action: () => { activatePeaceLaw(); } }
            ]
        };

        // --- 演出：浮き上がる数字 ---
        function spawnFloatText(e) {
            const area = document.getElementById('symbol-area');
            const text = document.createElement('div');
            text.className = 'click-float';
            text.innerText = "+" + (state.clickPower * state.eventMult).toFixed(1);
            
            // クリック位置（またはシンボルの中心）に配置
            text.style.left = `calc(50% + ${Math.random()*40-20}px)`;
            text.style.top = `20px`;
            
            area.appendChild(text);
            setTimeout(() => text.remove(), 600);
        }

        function switchMode(m) {
            state.mode = m;
            document.body.className = 'mode-' + m.toLowerCase();
            document.getElementById('game-container').className = 'mode-' + m.toLowerCase();
            const title = document.getElementById('title');
            const symbol = document.getElementById('symbol');

            if (m === 'USSR') { document.body.style.backgroundColor = '#8B0000'; title.innerText = '☭ プロレタリア・クリッカー'; symbol.innerText = '☭'; }
            else if (m === 'USA') { document.body.style.backgroundColor = '#002868'; title.innerText = '＄ キャピタル・クリッカー'; symbol.innerText = '＄'; }
            else if (m === 'JAPAN') { document.body.style.backgroundColor = '#eeeeee'; title.innerText = '☉ 帝国クリッカー'; symbol.innerText = '☉'; }
            renderUpgrades();
            updateDisplay();
        }

        function renderUpgrades() {
            const container = document.getElementById('upgrade-container');
            container.innerHTML = '';
            upgradeData[state.mode].forEach((u, i) => {
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.innerHTML = `<strong>${u.name}</strong><br><small>${u.desc}</small><br><button id="up-${i}" onclick="buyUpgrade(${i})">コスト: ${u.cost}</button>`;
                container.appendChild(card);
            });
        }

        function buyUpgrade(i) {
            const u = upgradeData[state.mode][i];
            if (state.points >= u.cost) {
                state.points -= u.cost;
                u.action();
                u.cost += 1;
                renderUpgrades();
                updateDisplay();
            }
        }

        function activatePeaceLaw() {
            let threshold = state.clickPower * state.autoPower * 100;
            if (state.points > threshold && !state.peacePreservationActive) {
                state.points = Math.floor(state.points / 2);
                state.peacePreservationActive = true;
                state.eventMult *= 5;
                alert("治安維持法発動！");
                setTimeout(() => { state.eventMult /= 5; state.peacePreservationActive = false; updateDisplay(); }, 60000);
            } else { alert("条件未達成"); }
        }

        // イベントシステム省略（ロジックは前回同様）
        setInterval(() => {
            const ev = ["世界大戦", "世界恐慌", "東西冷戦", "ソ連崩壊", "大東亜共栄圏"][Math.floor(Math.random()*5)];
            document.getElementById('event-display').innerText = `【歴史】${ev}`;
            // (簡易イベント処理)
            setTimeout(() => { document.getElementById('event-display').innerText = "平和な時代"; }, 15000);
        }, 45000);

        function updateDisplay() {
            document.getElementById('points').innerText = Math.floor(state.points);
            document.getElementById('power').innerText = (state.clickPower * state.eventMult).toFixed(1);
            document.getElementById('auto-val').innerText = (state.autoPower * state.eventMult).toFixed(1);
            document.getElementById('interval-display').innerText = state.interval;
            
            document.querySelectorAll('.upgrade-card button').forEach(btn => {
                const cost = parseInt(btn.innerText.replace('コスト: ', ''));
                btn.disabled = state.points < cost;
            });
        }

        document.getElementById('symbol').onclick = () => { state.points += state.clickPower * state.eventMult; updateDisplay(); };

        let autoTimer;
        function resetAutoLoop() {
            clearInterval(autoTimer);
            autoTimer = setInterval(() => { state.points += state.autoPower * state.eventMult; updateDisplay(); }, state.interval);
        }

        window.onkeydown = (e) => {
            if (e.code === 'Space') { 
                e.preventDefault(); 
                document.getElementById('symbol').dispatchEvent(new Event('mousedown'));
                document.getElementById('symbol').click(); 
            }
        };

        switchMode('USSR');
        resetAutoLoop();
    </script>
</body>
</html>
