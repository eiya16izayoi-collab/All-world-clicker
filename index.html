<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global History Clicker - Evolution</title>
    <style>
        body { 
            transition: 0.5s; font-family: 'serif'; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; background-color: #8B0000;
        }

        #game-container { 
            text-align: center; border: 8px double; padding: 20px; 
            width: 550px; position: relative; background: rgba(0,0,0,0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* 進出エリアのスタイル */
        #migration-area {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            border: 1px dashed;
        }
        .migration-btn {
            background: #fff !important; color: #000 !important;
            padding: 10px 20px !important; font-size: 1.1rem !important;
            border: 3px double #000 !important;
        }

        #symbol-area { position: relative; height: 160px; display: flex; justify-content: center; align-items: center; }
        #symbol { 
            font-size: 110px; cursor: pointer; user-select: none; 
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        #symbol:active { transform: scale(1.3) rotate(10deg); }

        .click-float {
            position: absolute; pointer-events: none; font-weight: bold;
            font-size: 24px; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }

        #event-container { margin: 15px 0; }
        #event-display { background: #000; color: #fff; padding: 10px; border-radius: 4px; font-weight: bold; }
        #event-timer-bar { height: 4px; background: #FF4500; width: 0%; transition: width 0.1s linear; margin-top: 2px; }

        .stats-board { 
            background: rgba(0,0,0,0.15); padding: 15px; margin-bottom: 20px; 
            display: grid; grid-template-columns: 1fr 1fr; text-align: left; border-radius: 8px;
        }

        .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upgrade-card { border: 2px solid; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); }

        button { cursor: pointer; font-weight: bold; padding: 8px; transition: 0.1s; border-radius: 4px; width: 100%; }
        button:active:not(:disabled) { transform: scale(0.95); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* モードカラー */
        .mode-ussr { color: #FFD700; border-color: #FFD700; }
        .mode-ussr button { background: #FFD700; color: #8B0000; border: none; }
        .mode-usa { color: #ffffff; border-color: #BF0A30; }
        .mode-usa button { background: #BF0A30; color: #ffffff; border: 1px solid #fff; }
        .mode-japan { color: #9e0b0f; border-color: #9e0b0f; }
        .mode-japan button { background: #9e0b0f; color: #ffffff; border: none; }
    </style>
</head>
<body class="mode-ussr">

    <div id="game-container" class="mode-ussr">
        <div id="migration-area">
            <div id="migration-status">現在の進捗: ソ連体制下</div>
            <button id="migrate-btn" class="migration-btn" onclick="migrateCountry()" disabled>
                10000万稼いでアメリカへ進出
            </button>
        </div>
        
        <h1 id="title">☭ プロレタリア・クリッカー</h1>
        
        <div id="event-container">
            <div id="event-display">平和な時代 (x1.0)</div>
            <div id="event-timer-bar"></div>
        </div>

        <div id="symbol-area">
            <div id="symbol" onmousedown="spawnFloatText(event)">☭</div>
        </div>

        <div class="stats-board">
            <div>共通資金: <span id="points">0</span></div>
            <div>生産倍率: <span id="mult-val">x1.0</span></div>
            <div>1クリック: <span id="power">1</span></div>
            <div>自動生産: <span id="auto-val">0</span></div>
            <div style="grid-column: span 2; text-align:center; font-size: 0.8rem; margin-top:5px;">
                自動生産間隔: <span id="interval-display">100.00</span>秒
            </div>
        </div>

        <div id="upgrade-container" class="upgrade-grid"></div>
    </div>

    <script>
        const GOAL = 100000000; // 10000万 (1億)

        let state = {
            mode: 'USSR', points: 0, clickPower: 1, autoPower: 0,
            interval: 100000, 
            debuffResist: 1.0, eventMult: 1.0,
            usaTaxBonus: 1.0, japanSpirit: 1.0,
            unlocked: ['USSR'] // 最初はソ連のみ
        };

        const upgradeData = {
            USSR: [
                { name: "五カ年計画", desc: "自動生産+5 / 間隔-10%", cost: 50, action: () => { state.autoPower += 5; state.interval *= 0.9; resetAutoLoop(); } },
                { name: "思想教育", desc: "デバフ耐性UP", cost: 200, action: () => { state.debuffResist -= 0.05; } },
                { name: "重工業化", desc: "クリック+10 / 間隔-5%", cost: 300, action: () => { state.clickPower += 10; state.interval *= 0.95; resetAutoLoop(); } },
                { name: "宇宙開発競争", desc: "生産力1.5倍", cost: 2000, action: () => { state.clickPower *= 1.5; state.autoPower *= 1.5; } }
            ],
            USA: [
                { name: "自由市場", desc: "クリック+10 / 税収ボーナス", cost: 500, action: () => { state.clickPower += 10; state.usaTaxBonus += 0.05; } },
                { name: "シリコンバレー", desc: "間隔短縮(-20%)", cost: 5000, action: () => { state.interval *= 0.8; resetAutoLoop(); } },
                { name: "マーシャルプラン", desc: "自動生産+500", cost: 10000, action: () => { state.autoPower += 500; } },
                { name: "ドルの覇権", desc: "クリック+1000", cost: 50000, action: () => { state.clickPower += 1000; } }
            ],
            JAPAN: [
                { name: "富国強兵", desc: "Click+100 / 間隔-15%", cost: 20000, action: () => { state.clickPower += 100; state.interval *= 0.85; resetAutoLoop(); } },
                { name: "八紘一宇", desc: "自動+1000 / 精神力UP", cost: 100000, action: () => { state.autoPower += 1000; state.japanSpirit += 0.1; } },
                { name: "大和魂", desc: "全能力UP / 間隔-20%", cost: 500000, action: () => { state.clickPower += 500; state.autoPower += 5000; state.interval *= 0.8; resetAutoLoop(); } },
                { name: "治安維持法", desc: "条件で1分間5倍", cost: 0, action: () => { activatePeaceLaw(); } }
            ]
        };

        // 国家進出システム
        function migrateCountry() {
            if (state.points < GOAL) return;

            if (state.mode === 'USSR') {
                state.points -= GOAL;
                state.mode = 'USA';
                state.unlocked.push('USA');
                alert("ソ連からアメリカへ進出しました！資金10000万を消費して新技術を導入します。");
            } else if (state.mode === 'USA') {
                state.points -= GOAL;
                state.mode = 'JAPAN';
                state.unlocked.push('JAPAN');
                alert("アメリカから大日本帝国へ進出しました！全ステータスを継承し、帝国主義の頂点を目指します。");
            }
            switchMode(state.mode);
        }

        function switchMode(m) {
            // アンロックされていない国には行けない
            if (!state.unlocked.includes(m)) {
                alert("まだこの国へ進出する権利がありません。10000万貯めてください。");
                return;
            }

            state.mode = m;
            const container = document.getElementById('game-container');
            const body = document.body;
            container.className = 'mode-' + m.toLowerCase();
            body.className = 'mode-' + m.toLowerCase();

            const title = document.getElementById('title');
            const symbol = document.getElementById('symbol');
            const migBtn = document.getElementById('migrate-btn');
            const migStatus = document.getElementById('migration-status');

            if (m === 'USSR') {
                body.style.backgroundColor = '#8B0000';
                title.innerText = '☭ プロレタリア・クリッカー';
                symbol.innerText = '☭';
                migStatus.innerText = "現在の進捗: ソ連体制下";
                migBtn.innerText = "10000万稼いでアメリカへ進出";
                migBtn.style.display = "block";
            } else if (m === 'USA') {
                body.style.backgroundColor = '#002868';
                title.innerText = '＄ キャピタル・クリッカー';
                symbol.innerText = '＄';
                migStatus.innerText = "現在の進捗: アメリカ資本主義";
                migBtn.innerText = "10000万稼いで日本へ進出";
                migBtn.style.display = "block";
            } else if (m === 'JAPAN') {
                body.style.backgroundColor = '#eeeeee';
                title.innerText = '☉ 帝国クリッカー';
                symbol.innerText = '☉';
                migStatus.innerText = "現在の進捗: 大日本帝国（最終形態）";
                migBtn.style.display = "none"; // 日本が最終
            }
            renderUpgrades();
            updateDisplay();
        }

        // --- 以下共通処理 ---

        function renderUpgrades() {
            const container = document.getElementById('upgrade-container');
            container.innerHTML = '';
            upgradeData[state.mode].forEach((u, i) => {
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.innerHTML = `<strong>${u.name}</strong><br><small>${u.desc}</small><br><button id="up-${i}" onclick="buyUpgrade(${i})">コスト: ${u.cost}</button>`;
                container.appendChild(card);
            });
        }

        function buyUpgrade(i) {
            const u = upgradeData[state.mode][i];
            if (state.points >= u.cost) {
                state.points -= u.cost;
                u.action();
                u.cost = Math.floor(u.cost * 1.3) + 1;
                renderUpgrades();
                updateDisplay();
            }
        }

        function spawnFloatText() {
            const area = document.getElementById('symbol-area');
            const text = document.createElement('div');
            text.className = 'click-float';
            let val = (state.clickPower * state.eventMult * state.usaTaxBonus * state.japanSpirit).toFixed(1);
            text.innerText = "+" + val;
            text.style.left = `calc(50% + ${Math.random()*60-30}px)`;
            text.style.top = `20px`;
            area.appendChild(text);
            setTimeout(() => text.remove(), 600);
        }

        function updateDisplay() {
            const p = state.points;
            document.getElementById('points').innerText = Math.floor(p);
            document.getElementById('mult-val').innerText = `x${(state.eventMult * state.usaTaxBonus * state.japanSpirit).toFixed(1)}`;
            document.getElementById('power').innerText = (state.clickPower * state.eventMult * state.usaTaxBonus * state.japanSpirit).toFixed(1);
            document.getElementById('auto-val').innerText = (state.autoPower * state.eventMult * state.usaTaxBonus * state.japanSpirit).toFixed(1);
            document.getElementById('interval-display').innerText = (state.interval / 1000).toFixed(2);
            
            // 進出ボタンの制御
            const migBtn = document.getElementById('migrate-btn');
            if (p >= GOAL) {
                migBtn.disabled = false;
                migBtn.style.boxShadow = "0 0 15px #fff";
            } else {
                migBtn.disabled = true;
                migBtn.style.boxShadow = "none";
            }

            document.querySelectorAll('.upgrade-card button').forEach(btn => {
                const cost = parseInt(btn.innerText.replace('コスト: ', ''));
                btn.disabled = p < cost;
            });
        }

        // イベントシステム
        setInterval(() => {
            const evs = [
                { name: "世界大戦", mult: 2.5, color: "#ff4500" },
                { name: "世界恐慌", mult: 0.1, color: "#555" },
                { name: "冷戦", mult: 1.5, color: "#00bfff" }
            ];
            const ev = evs[Math.floor(Math.random() * evs.length)];
            let m = ev.mult;
            if (m < 1.0) m = 1.0 - ((1.0 - m) * state.debuffResist);
            state.eventMult = m;
            const d = document.getElementById('event-display');
            const b = document.getElementById('event-timer-bar');
            d.innerText = `【${ev.name}】発動中 (x${state.eventMult.toFixed(1)})`;
            d.style.color = ev.color;
            b.style.transition = "none"; b.style.width = "100%";
            setTimeout(() => { b.style.transition = "width 15s linear"; b.style.width = "0%"; }, 100);
            setTimeout(() => { state.eventMult = 1.0; d.innerText = "平和な時代 (x1.0)"; d.style.color = "#fff"; updateDisplay(); }, 15000);
        }, 45000);

        function performClick() {
            state.points += state.clickPower * state.eventMult * state.usaTaxBonus * state.japanSpirit;
            spawnFloatText();
            updateDisplay();
        }

        document.getElementById('symbol').onclick = performClick;

        let autoTimer;
        function resetAutoLoop() {
            clearInterval(autoTimer);
            autoTimer = setInterval(() => {
                state.points += state.autoPower * state.eventMult * state.usaTaxBonus * state.japanSpirit;
                updateDisplay();
            }, state.interval);
        }

        window.onkeydown = (e) => {
            if (e.code === 'Space') { e.preventDefault(); performClick(); }
        };

        switchMode('USSR');
        resetAutoLoop();
    </script>
</body>
</html>
